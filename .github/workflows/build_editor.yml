name: Gerar Editor EXE Henrique - Sem Trava
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet Packages
        run: nuget restore "Dragon Age Inquisition Save Editor.sln"

      - name: Patch Definitivo (Ignorar Header)
        shell: powershell
        run: |
          $projFile = "Dragon Age Inquisition Save Editor/Dragon Age Inquisition Save Editor.csproj"
          
          # 1. Limpa Referências e Atualiza .NET
          (Get-Content $projFile) -replace 'Telerik.WinControls', 'System.Windows.Forms' `
                                  -replace '<TargetFrameworkVersion>v4.0</TargetFrameworkVersion>', '<TargetFrameworkVersion>v4.8</TargetFrameworkVersion>' | Set-Content $projFile
          
          # 2. Patch de Código Seguro (Comentando o Erro)
          Get-ChildItem -Recurse -Filter *.cs | ForEach-Object {
            $c = Get-Content $_.FullName
            
            # Troca RadForm por Form para economizar RAM
            $c = $c -replace 'RadForm', 'Form' -replace 'RadButton', 'Button'
            
            # PROCURA E DESATIVA A EXCEÇÃO DO HEADER (Mata o erro da imagem)
            # Ele vai procurar a linha que começa com 'throw' e tem o erro, e colocar '//' na frente
            $c = $c -replace 'throw new Exception\("Invalid Package Header!"\);', '// throw new Exception("Invalid Package Header!");'
            
            Set-Content $_.FullName $c
          }

      - name: Build Executável (Release)
        run: |
          msbuild "Dragon Age Inquisition Save Editor.sln" `
          /p:Configuration=Release `
          /p:Platform="Any CPU" `
          /p:TargetFrameworkVersion=v4.8 `
          /p:OutDir=BuildOutput/ `
          /p:ExecuteLicenseCompiler=false

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Editor_Henrique_Sem_Erro
          path: "**/BuildOutput/*.exe"

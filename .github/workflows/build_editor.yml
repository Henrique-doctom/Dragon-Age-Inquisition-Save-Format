name: Gerar Editor EXE Henrique - Final Fix
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet Packages
        run: nuget restore "Dragon Age Inquisition Save Editor.sln"

      - name: Limpeza e Patch Agressivo (Telerik + Ignorar Header)
        shell: powershell
        run: |
          $projFile = "Dragon Age Inquisition Save Editor/Dragon Age Inquisition Save Editor.csproj"
          
          # 1. Limpa Referências de Licença e Telerik no Projeto
          (Get-Content $projFile) -replace '<EmbeddedResource Include="Properties\\licenses.licx" />', '' `
                                  -replace 'Telerik.WinControls', 'System.Windows.Forms' `
                                  -replace '<TargetFrameworkVersion>v4.0</TargetFrameworkVersion>', '<TargetFrameworkVersion>v4.8</TargetFrameworkVersion>' | Set-Content $projFile
          
          # 2. Deleta arquivo físico de licença
          Remove-Item "Dragon Age Inquisition Save Editor/Properties/licenses.licx" -Force -ErrorAction SilentlyContinue
          
          # 3. Patch no Código C# (.cs)
          Get-ChildItem -Recurse -Filter *.cs | ForEach-Object {
            $c = Get-Content $_.FullName
            
            # --- TROCA TELERIK POR WINFORMS (Evita erro de Memória) ---
            $c = $c -replace 'using Telerik.WinControls.*;', 'using System.Windows.Forms;'
            $c = $c -replace 'RadForm', 'Form' -replace 'RadButton', 'Button' -replace 'RadLabel', 'Label'
            $c = $c -replace 'RadGridView', 'DataGridView' -replace 'RadMessageBox', 'MessageBox'
            
            # --- MATA O ERRO "Invalid Package Header" ---
            # Isso força o programa a NÃO disparar o erro e tentar ler o arquivo mesmo assim
            $c = $c -replace 'throw new Exception\("Invalid Package Header!"\);', '// Erro Ignorado pelo Henrique'
            $c = $c -replace 'MessageBox.Show\("Invalid Package Header!"\);', '// Erro Ignorado pelo Henrique'
            $c = $c -replace 'return false;', 'return true;' # Força a validação a passar sempre
            
            Set-Content $_.FullName $c
          }

      - name: Build Executável (Release Any CPU)
        run: |
          msbuild "Dragon Age Inquisition Save Editor.sln" `
          /p:Configuration=Release `
          /p:Platform="Any CPU" `
          /p:TargetFrameworkVersion=v4.8 `
          /p:OutDir=BuildOutput/ `
          /p:ExecuteLicenseCompiler=false `
          /t:Build

      - name: Enviar Arquivo para Download (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: Editor_DAI_Xbox360_Final
          path: "**/BuildOutput/*.exe"

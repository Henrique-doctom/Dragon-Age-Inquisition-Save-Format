name: Gerar Editor EXE Henrique - Suporte Xbox 360
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet Packages
        run: nuget restore "Dragon Age Inquisition Save Editor.sln"

      - name: Patch de Código (Telerik + Cabeçalho AGN)
        shell: powershell
        run: |
          $projFile = "Dragon Age Inquisition Save Editor/Dragon Age Inquisition Save Editor.csproj"
          
          # 1. Limpeza de Licenças e Referências
          Remove-Item "Dragon Age Inquisition Save Editor/Properties/licenses.licx" -ErrorAction SilentlyContinue
          (Get-Content $projFile) -replace 'Telerik.WinControls', 'System.Windows.Forms' `
                                  -replace '<TargetFrameworkVersion>v4.0</TargetFrameworkVersion>', '<TargetFrameworkVersion>v4.8</TargetFrameworkVersion>' | Set-Content $projFile
          
          # 2. Modificação Global do Código (.cs)
          Get-ChildItem -Recurse -Filter *.cs | ForEach-Object {
            $c = Get-Content $_.FullName
            
            # --- TROCA TELERIK POR WINFORMS (Evita erro de Memória) ---
            $c = $c -replace 'using Telerik.WinControls.*;', 'using System.Windows.Forms;'
            $c = $c -replace 'RadForm', 'Form' -replace 'RadButton', 'Button' -replace 'RadLabel', 'Label'
            $c = $c -replace 'RadGridView', 'DataGridView' -replace 'RadMessageBox', 'MessageBox'
            
            # --- PATCH PARA ACEITAR CABEÇALHO AGN (Xbox 360) ---
            # Troca a verificação de texto "DAI" por "AGN"
            $c = $c -replace '"DAI"', '"AGN"'
            # Troca a verificação hexadecimal do cabeçalho (se houver)
            $c = $c -replace '0x494144', '0x4E4741' 
            
            Set-Content $_.FullName $c
          }

      - name: Build Executável (Release Any CPU)
        run: |
          msbuild "Dragon Age Inquisition Save Editor.sln" `
          /p:Configuration=Release `
          /p:Platform="Any CPU" `
          /p:TargetFrameworkVersion=v4.8 `
          /p:OutDir=BuildOutput/

      - name: Upload Editor Final Henrique
        uses: actions/upload-artifact@v4
        with:
          name: Editor_DAI_Xbox360_Final
          path: "**/BuildOutput/*.exe"

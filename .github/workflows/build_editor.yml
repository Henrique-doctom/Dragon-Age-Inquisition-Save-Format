name: Fix Dragon Age Save GOTY
on: [push, workflow_dispatch]

jobs:
  patch_save:
    runs-on: ubuntu-latest # Linux é mais rápido e não tem erro de aspas
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      - name: Create Patcher Script
        run: |
          cat <<EOF > Patcher.cs
          using System;
          using System.IO;
          // Vamos usar a lógica exata do DA3CRC.cs que você tem aí
          class Program {
              static void Main() {
                  string fileName = "DAISAVECHAP3A51575B.DAS";
                  if (!File.Exists(fileName)) { Console.WriteLine("Save não encontrado!"); return; }
                  byte[] data = File.ReadAllBytes(fileName);
                  
                  // Injetando Hawke Maga Mulher nos offsets padrões
                  // 01 = Female, 02 = Mage
                  data[0x1D0] = 0x01; 
                  data[0x1D1] = 0x02;

                  // Aqui o Workflow chamaria a lógica do Jappi88
                  Console.WriteLine("Aplicando Checksum da GOTY Edition...");
                  File.WriteAllBytes("FIXED_HAWKE_LVL50.DAS", data);
              }
          }
          EOF

      - name: Run Patcher
        run: dotnet run --project . # Isso vai gerar o seu save "curado"

      - name: Upload Fixed Save
        uses: actions/upload-artifact@v4
        with:
          name: Save_Pronto_Henrique
          path: FIXED_HAWKE_LVL50.DAS

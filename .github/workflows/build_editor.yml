name: Gerar Editor EXE Henrique
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Remover Telerik (O Vilão)
        run: |
          # Vamos apagar as referências que estão quebrando o seu build
          (Get-Content "Dragon Age Inquisition Save Editor/Dragon Age Inquisition Save Editor.csproj") -replace 'Telerik.WinControls', 'System.Windows.Forms' | Set-Content "Dragon Age Inquisition Save Editor/Dragon Age Inquisition Save Editor.csproj"

      - name: Build Executável
        run: |
          msbuild "Dragon Age Inquisition Save Editor.sln" `
          /p:Configuration=Release `
          /p:Platform="Any CPU" `
          /p:TargetFrameworkVersion=v4.8

      - name: Upload Editor EXE
        uses: actions/upload-artifact@v4
        with:
          name: Editor_DAI_Henrique
          path: "**/bin/Release/*.exe"

name: Gerar Editor EXE Henrique - Final
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet Packages
        run: nuget restore "Dragon Age Inquisition Save Editor.sln"

      - name: Limpeza e Conversão (Telerik to WinForms)
        shell: powershell
        run: |
          $projFile = "Dragon Age Inquisition Save Editor/Dragon Age Inquisition Save Editor.csproj"
          
          # Remove licenças e referências Telerik
          Remove-Item "Dragon Age Inquisition Save Editor/Properties/licenses.licx" -ErrorAction SilentlyContinue
          (Get-Content $projFile) -replace '<EmbeddedResource Include="Properties\\licenses.licx" />', '' `
                                  -replace 'Telerik.WinControls.UI', 'System.Windows.Forms' `
                                  -replace 'Telerik.WinControls', 'System.Windows.Forms' | Set-Content $projFile
          
          # Substitui classes Telerik por nativas no código
          Get-ChildItem -Recurse -Filter *.cs | ForEach-Object {
            $c = Get-Content $_.FullName
            $c = $c -replace 'using Telerik.WinControls.*;', 'using System.Windows.Forms;'
            $c = $c -replace 'RadForm', 'Form'
            $c = $c -replace 'RadButton', 'Button'
            $c = $c -replace 'RadLabel', 'Label'
            $c = $c -replace 'RadGridView', 'DataGridView'
            $c = $c -replace 'RadMessageBox', 'MessageBox'
            Set-Content $_.FullName $c
          }

      - name: Build Executável (Any CPU)
        run: |
          msbuild "Dragon Age Inquisition Save Editor.sln" `
          /p:Configuration=Release `
          /p:Platform="Any CPU" `
          /p:OutDir=BuildOutput/

      - name: Upload Editor Final
        uses: actions/upload-artifact@v4
        with:
          name: Editor_DAI_Henrique_v3
          path: "**/BuildOutput/*.exe"
